services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aicloud
      POSTGRES_USER: aicloud
      POSTGRES_PASSWORD: aicloud
    ports: ["5432:5432"]
    volumes: ["aicloud-postgres:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api-server:
    profiles: ["app"]
    build: .
    environment:
      AICLOUD_HTTP_ADDR: ":8080"
      AICLOUD_DATABASE_URL: postgres://aicloud:aicloud@postgres:5432/aicloud?sslmode=disable
      AICLOUD_REDIS_URL: redis://redis:6379/0
    ports: ["8080:8080"]
    depends_on: [postgres, redis]
volumes:
  aicloud-postgres:
